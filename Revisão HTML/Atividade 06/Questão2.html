<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário 2</title>
    <link rel="stylesheet" type="text/css" href="Questao2.css" />
</head>

<body>
    <form>
        <p>SISTEMA DE GESTÃO ACADÊMICA</p>
        <h3>MANUTENÇÃO DE USUÁRIOS DO SISTEMA INTERNO</h3><br>

        <table cellpadding="8">

            <tr>
                <td><b>Login:</b></td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td><b>Senha:</b></td>
                <td><input type="password"></td>
            </tr>

            <tr>
                <td><b>Status:</b></td>
                <td>
                    <select>
                        <option>Inativo</option>
                        <option>Ativo</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><b>Tipo:</b></td>
                <td>
                    <input type="radio" name="tipo"> Técnico
                    <input type="radio" name="tipo"> Professor
                    <input type="radio" name="tipo"> Aluno
                </td>
            </tr>

            <tr>
                <td><b>Data Criação:</b></td>
                <td><input type="date"></td>
            </tr>

            <tr>
                <td><b>Perfil:</b></td>
                <td>
                    <input type="radio" name="perfil"> Convidado
                    <input type="radio" name="perfil"> Administrador
                </td>
            </tr>

            <tr>
                <td><b>Observação:</b></td>
                <td>
                    <textarea rows="5" cols="40"></textarea><br><br>
                </td>
            </tr>

            <tr>
                <td><b>Módulos:</b></td>
                <td>
                    <input type="checkbox"> Compras
                    <input type="checkbox"> Biblioteca
                    <input type="checkbox"> Acadêmico<br>

                    <input type="checkbox"> Documentação
                    <input type="checkbox"> Recursos Humanos<br><br>
                </td>
            </tr>
        </table>

        <button type="submit">Cadastrar</button>
        <button type="reset">Excluir</button>
    </form>
</body>

</html>
