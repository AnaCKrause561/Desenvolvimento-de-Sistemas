<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fomulário 1</title>
</head>

<body>
    <h3>Deixei um comentário</h3>

    <form>
        <label><b>Nome:</b></label><br>
        <input type="text"><br><br>

        <label><b>E-mail:</b></label><br>
        <input type="email"><br><br>

        <label><b>Website:</b></label><br>
        <input type="text"><br><br>

        <label><b>Comentário:</b></label><br>
        <textarea rows="6" cols="50"></textarea><br><br>

        <h5>Observação: Seu comentário será publicado após passar pelo moderador</h5>

        <button type="submit">Enviar Comentário</button>
    </form>
</body>
</html>
