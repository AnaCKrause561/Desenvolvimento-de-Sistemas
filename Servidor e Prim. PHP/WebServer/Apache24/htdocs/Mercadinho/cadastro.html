<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>Cadastro</title>
</head>

<body>

    <!--TOPO-->
    <header class="topo">
        <div class="logo">
            <img src="Imagens/Logo.png" alt="logo">
        </div>

        <h1>Qualidade e economia perto de você</h1>

        <div class="usuario">
            <img src="Imagens/login.png" alt="usuario">
            <p>Ana Cristina</p>
        </div>
    </header>

    <!--MENU-->
    <aside class="menu">

        <h2>☰ Menu</h2>

        <ul>
            <li>Produtos</li>
            <li>Fornecedores</li>
            <li>Cadastro</li>
        </ul>
    </aside>

    <!-- CARD -->
    <main class="conteudo">
        <div class="card">

            <h2>Cadastro de Produto</h2>

            <label>Produto</label>
            <input type="text" name="produto" placeholder="Digite Produto">

            <label>Quantidade</label>
            <input type="number" name="quantidade" placeholder="Quantidade">

            <label>Preço</label>
            <input type="number" name="nome" step="0.01" placeholder="Digite Preço">

            <button>Cadastrar</button>
        </div>
    </main>
</body>
</html>
